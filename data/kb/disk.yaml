domain: disk
version: "1.0"
description: "Disk, filesystem, and storage troubleshooting knowledge base"

rules:
  - rule_id: DISK_001
    name: "Disk Partition Full"
    priority: 10
    trigger_symptoms:
      - "ổ đĩa đầy"
      - "disk đầy"
      - "không còn dung lượng"
      - "ổ cứng đầy"
      - "no space left on device"
      - "disk full"
      - "ENOSPC"
      - "disk is full"
      - "write failed"
      - "cannot write"
      - "insufficient disk space"
      - "write error"
      - "disk space"
      - "running out of space"
      - "storage full"
      - "disk usage"
      - "dung lượng ổ"
    hypotheses:
      - id: "partition_disk_full"
        description: "Disk partition has exceeded safe usage threshold"
        confidence: 0.85
      - id: "inode_exhaustion"
        description: "Inode count exhausted on filesystem"
        confidence: 0.20
    evidence_gathering:
      - hypothesis_id: "partition_disk_full"
        command: "df -h $(df /var/lib/docker 2>/dev/null | tail -1 | awk '{print $NF}') 2>/dev/null || df -h / 2>/dev/null | tail -1"
        parser_regex: "(?P<filesystem>\\S+)\\s+(?P<size>\\S+)\\s+(?P<used>\\S+)\\s+(?P<avail>\\S+)\\s+(?P<use_pct>\\d+)%\\s+(?P<mount_on>\\S+)"
        fact_key: "disk_usage"
      - hypothesis_id: "partition_disk_full"
        command: "df -h /var/lib/docker 2>/dev/null || df -h / 2>/dev/null"
        parser_regex: "(?P<use_pct>\\d+)%\\s+"
        fact_key: "disk_use_percent"
      - hypothesis_id: "inode_exhaustion"
        command: "df -i $(df /var/lib/docker 2>/dev/null | tail -1 | awk '{print $NF}') 2>/dev/null || df -i / 2>/dev/null | tail -1"
        parser_regex: "(?P<inode_use_pct>\\d+)%\\s+(?P<inode_mount>\\S+)$"
        fact_key: "inode_usage"
      - hypothesis_id: "partition_disk_full"
        command: "du -sh /var /home /opt /usr /tmp 2>/dev/null | sort -rh | head -8"
        parser_regex: "(?P<dir_size>\\S+)\\s+(?P<dir_path>\\S+)"
        fact_key: "largest_dirs"
    root_cause_analysis:
      - hypothesis_id: "partition_disk_full"
        condition:
          fact: "disk_use_percent"
          operator: "greater_than"
          value: "90"
        root_cause: "Disk partition is {{disk_use_percent}}% full. Available: {{disk_usage.avail}}. Critical threshold is 90%. Service cannot write new data."
        recommended_fixes:
          - command: "du -sh /var /home /opt /usr /tmp 2>/dev/null | sort -rh | head -10"
            explanation: "Find the top directory consumers on the root filesystem"
            is_safe: true
          - command: "journalctl --vacuum-time=3d"
            explanation: "Clean systemd journal logs older than 3 days"
            is_safe: false
          - command: "apt-get clean && apt-get autoclean 2>/dev/null || yum clean all 2>/dev/null || dnf clean all 2>/dev/null"
            explanation: "Clean package manager cache"
            is_safe: false
          - command: "find /var/log -name '*.log' -mtime +30 -exec truncate -s 0 {} \\;"
            explanation: "Truncate log files older than 30 days"
            is_safe: false
      - hypothesis_id: "inode_exhaustion"
        condition:
          fact: "inode_use_pct"
          operator: "greater_than"
          value: "90"
        root_cause: "Inode usage is at {{inode_use_pct}}% on {{inode_usage.inode_mount}}. The filesystem has run out of inodes even if space is available."
        recommended_fixes:
          - command: "find / -xdev -type f | awk -F/ '!/^\\/proc|\\/sys|\\/dev/{a[$2]++} END{for(d in a) print a[d], d}' | sort -rn | head -10"
            explanation: "Find directories with the most files (inode consumers)"
            is_safe: true
          - command: "find /tmp -type f -atime +7 -delete 2>/dev/null || true"
            explanation: "Clean old temporary files that consume inodes"
            is_safe: false

  - rule_id: DISK_002
    name: "Filesystem I/O Errors Detected"
    priority: 9
    trigger_symptoms:
      - "ổ đĩa đầy"
      - "disk đầy"
      - "không còn dung lượng"
      - "ổ cứng đầy"
      - "I/O error"
      - "input/output error"
      - "failed to read"
      - "disk error"
      - "buffer I/O error"
      - "sdX"
      - "disk failure"
      - "disk problem"
      - "drive error"
      - "hard drive"
      - "disk không hoạt động"
    hypotheses:
      - id: "disk_fs_corruption"
        description: "Filesystem has detected corruption or bad blocks"
        confidence: 0.75
      - id: "disk_hardware_failure"
        description: "Physical disk hardware failure detected"
        confidence: 0.40
    evidence_gathering:
      - hypothesis_id: "disk_fs_corruption"
        command: "dmesg -T 2>/dev/null | grep -iE 'error|i/o|sd[a-z]' | tail -10 || echo 'NO_DMESG_ERRORS'"
        parser_regex: "(?P<disk_error>sd\\w+:.*error)"
        fact_key: "kernel_disk_errors"
      - hypothesis_id: "disk_hardware_failure"
        command: "smartctl -H $(mount | grep ' / ' | awk '{print $1}' | sed 's/[0-9]//') 2>/dev/null || echo 'SMARTCTL_FAILED'"
        parser_regex: "(?P<smart_health>PASSED|FAILED)"
        fact_key: "smart_health_status"
      - hypothesis_id: "disk_fs_corruption"
        command: "mount | grep ' / ' | awk '{print $1}' | xargs -I{} grep {} /proc/mounts"
        parser_regex: "(?P<fs_type>ext[234]|xfs|btrfs|zfs)"
        fact_key: "root_fs_type"
      - hypothesis_id: "disk_hardware_failure"
        command: "smartctl -A $(mount | grep ' / ' | awk '{print $1}' | sed 's/[0-9]//') 2>/dev/null | grep -iE 'Reallocated_Sector|Current_Pending_Sector|Uncorrectable_Sector_Ct' | head -3"
        parser_regex: "(?P<smart_attr>\\w+)\\s+.*\\s+(?P<raw_value>\\d+)"
        fact_key: "smart_reallocated_sectors"
    root_cause_analysis:
      - hypothesis_id: "disk_fs_corruption"
        condition:
          fact: "kernel_disk_errors"
          operator: "is_not_empty"
          value: ""
        root_cause: "Kernel reports I/O errors: {{kernel_disk_errors}}. Filesystem may need fsck or the disk may have bad sectors."
        recommended_fixes:
          - command: "umount /mountpoint && fsck -fy /dev/sdX || echo 'Cannot umount - schedule maintenance reboot'"
            explanation: "Force filesystem check. Schedule reboot if root partition."
            is_safe: false
          - command: "touch /forcefsck && reboot"
            explanation: "Schedule forced fsck on next reboot (systemd)"
            is_safe: false
      - hypothesis_id: "disk_hardware_failure"
        condition:
          fact: "smart_health_status"
          operator: "contains"
          value: "FAILED"
        after_condition:
          fact: "smart_reallocated_sectors"
          operator: "is_not_empty"
          value: ""
        root_cause: "SMART health check FAILED. Disk has {{smart_reallocated_sectors}} reallocated sectors. Disk is failing and should be replaced."
        recommended_fixes:
          - command: "smartctl -l error /dev/sdX"
            explanation: "View detailed SMART error log for failing disk"
            is_safe: true
          - command: "smartctl -t long /dev/sdX"
            explanation: "Run extended SMART self-test to assess damage"
            is_safe: true
          - command: "smartctl -l error /dev/sdX 2>/dev/null | tail -5"
            explanation: "Check SMART error log for read errors"
            is_safe: true

  - rule_id: DISK_003
    name: "Filesystem Mount Failed"
    priority: 8
    trigger_symptoms:
      - "ổ đĩa đầy"
      - "disk đầy"
      - "không còn dung lượng"
      - "ổ cứng đầy"
      - "mount failed"
      - "cannot mount"
      - "mount error"
      - "wrong fs type"
      - "superblock"
      - "mount:"
      - "not a directory"
      - "already mounted"
      - "drive not mounting"
      - "usb không mount"
    hypotheses:
      - id: "fstab_misconfig"
        description: "Mount entry in /etc/fstab is incorrect or device missing"
        confidence: 0.50
      - id: "fs_type_wrong"
        description: "Filesystem type mismatch between fstab and actual superblock"
        confidence: 0.30
    evidence_gathering:
      - hypothesis_id: "fstab_misconfig"
        command: "cat /etc/fstab 2>/dev/null | grep -v '^#' | grep -v '^$' | head -20"
        parser_regex: "(?P<fstab_dev>\\S+)\\s+(?P<fstab_mount>\\S+)\\s+(?P<fstab_type>\\S+)\\s+(?P<fstab_opts>\\S+)"
        fact_key: "fstab_entries"
      - hypothesis_id: "fs_type_wrong"
        command: "blkid 2>/dev/null | head -10"
        parser_regex: "(?P<blk_dev>/dev/\\w+):.*TYPE=\"(?P<blk_fs>\\w+)\""
        fact_key: "block_device_fs_types"
      - hypothesis_id: "fstab_misconfig"
        command: "lsblk -o NAME,FSTYPE,LABEL,MOUNTPOINT,SIZE 2>/dev/null | head -15"
        parser_regex: "(?P<blk_name>\\S+)\\s+(?P<blk_fstype>\\w+)\\s+(?P<blk_label>\\S*)\\s+(?P<blk_mount>\\S*)"
        fact_key: "block_devices"
    root_cause_analysis:
      - hypothesis_id: "fstab_misconfig"
        condition:
          fact: "fstab_entries"
          operator: "is_not_empty"
          value: ""
        root_cause: "/etc/fstab has mount entries but the device may be missing or the mount point incorrect. Check fstab device names against available block devices."
        recommended_fixes:
          - command: "lsblk -f"
            explanation: "List block devices with filesystem UUIDs and labels to compare against fstab"
            is_safe: true
          - command: "mount -a 2>&1"
            explanation: "Attempt to mount all fstab entries to see specific error"
            is_safe: false
      - hypothesis_id: "fs_type_wrong"
        condition:
          fact: "block_device_fs_types"
          operator: "is_not_empty"
          value: ""
        root_cause: "Filesystem type in /etc/fstab does not match the actual filesystem on the block device. blkid shows {{block_device_fs_types.blk_fs}} but fstab may specify a different type."
        recommended_fixes:
          - command: "blkid /dev/sdX"
            explanation: "Get the actual UUID and filesystem type from the device"
            is_safe: true
          - command: "# Edit /etc/fstab to match: UUID=$(blkid -s UUID -o value /dev/sdX) type=$(blkid -s TYPE -o value /dev/sdX)"
            explanation: "Update /etc/fstab with the correct UUID and filesystem type from blkid"
            is_safe: false

  - rule_id: DISK_004
    name: "Disk I/O Performance Issue"
    priority: 6
    trigger_symptoms:
      - "ổ đĩa đầy"
      - "disk đầy"
      - "không còn dung lượng"
      - "ổ cứng đầy"
      - "slow disk"
      - "high iowait"
      - "disk latency"
      - "await"
      - "svctm"
      - "disk queue"
      - "performance"
      - "disk speed"
      - "disk chậm"
      - "system chậm"
      - "load cao"
    hypotheses:
      - id: "disk_io_contention"
        description: "Disk I/O is saturated with high queue depth"
        confidence: 0.60
    evidence_gathering:
      - hypothesis_id: "disk_io_contention"
        command: "iostat -x 1 2 2>/dev/null | tail -15 || echo 'IOSTAT_FAILED'"
        parser_regex: "(?P<device>sd\\w+)\\s+.*\\s+(?P<await>\\d+\\.\\d+)\\s+(?P<svctm>\\d+\\.\\d+)\\s+(?P<util>\\d+\\.\\d+)"
        fact_key: "disk_io_stats"
      - hypothesis_id: "disk_io_contention"
        command: "pidstat -d 1 2 2>/dev/null | tail -10 || echo 'PIDSTAT_FAILED'"
        parser_regex: "(?P<pid>\\d+)\\s+(?P<io_process>\\S+)\\s+.*\\s+(?P<kb_read>\\d+)\\s+(?P<kb_write>\\d+)"
        fact_key: "io_by_process"
    root_cause_analysis:
      - hypothesis_id: "disk_io_contention"
        condition:
          fact: "disk_io_stats"
          operator: "is_not_empty"
          value: ""
        root_cause: "Disk I/O is saturated. Device {{disk_io_stats.device}} has await={{disk_io_stats.await}}ms with utilization {{disk_io_stats.util}}%. High await indicates I/O congestion."
        recommended_fixes:
          - command: "iotop -o -P -n 1 2>/dev/null || pidstat -d 1 3"
            explanation: "Identify processes with the highest I/O activity"
            is_safe: true
          - command: "ionice -c 3 -p <high_io_pid>"
            explanation: "Set idle I/O scheduling class for non-critical I/O processes"
            is_safe: false
          - command: "sysctl -w vm.dirty_ratio=10 && sysctl -w vm.dirty_background_ratio=5"
            explanation: "Reduce dirty page thresholds to smooth write bursts"
            is_safe: false
